name = "realworld"
version = "0.1.0"
target = "erlang"

[dependencies]
gleam_erlang = ">= 1.0.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_stdlib = ">= 0.60.0 and < 2.0.0"
rally = { path = "../.." }
libero = { path = "../../../libero" }
lustre = ">= 5.6.0 and < 7.0.0"
marmot = ">= 1.3.1 and < 2.0.0"
mist = ">= 6.0.0 and < 7.0.0"
sqlight = ">= 1.0.0 and < 2.0.0"
simplifile = ">= 2.0.0 and < 3.0.0"
gleam_regexp = ">= 1.1.1 and < 2.0.0"
gleam_time = ">= 1.7.0 and < 2.0.0"
argus = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
birdie = ">= 2.0.0 and < 3.0.0"
glinter = ">= 2.17.0 and < 3.0.0"

[tools.glinter]
stats = true
warnings_as_errors = true
exclude = ["src/generated/", ".generated_clients/"]

[[tools.rally.clients]]
namespace = "public"
route_root = "/"

[tools.marmot]
database = "app.db"
sql_dir = "src/sql"
output = "src/generated/sql"
